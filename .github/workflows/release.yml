---
name: sonar-release
# This workflow is triggered when publishing a new github release
# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@8974b5c27a786cdf7bba286a2fff5d12a2f7d78a # 7.2.0
    with:
      publishToBinaries: true
      slackChannel: ask-squad-web
