---
name: sonar-release
# This workflow is triggered manually with the full release version.
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      version:
        description: Full version including build number, e.g. 1.4.0.120
        required: true
        type: string
      dryRun:
        description: Flag to enable the dry-run execution
        default: false
        required: false
        type: boolean

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@0c9c1cc54cbdd24258f135601d1b77cfc87e67ae # 7.4.0
    with:
      version: ${{ inputs.version }}
      publishToBinaries: true
      slackChannel: core-languages-releases
      dryRun: ${{ inputs.dryRun == true }}
