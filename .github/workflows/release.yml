---
name: sonar-release
# This workflow is triggered when publishing a new github release
# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@10096ab3906368cbaf65e2fd23178dc4f45a51f4 # 6.8.0
    with:
      publishToBinaries: true
      slackChannel: ask-squad-web
